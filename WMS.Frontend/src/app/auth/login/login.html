<div style="display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f6f9;">
  <div class="card" style="width: 400px; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); background: white;">
    <h2 style="text-align: center; color: #3f51b5; margin-bottom: 20px;">WMS Portal Login</h2>
    
    <div *ngIf="errorMessage" style="background-color: #ffebee; color: #c62828; padding: 10px; border-radius: 4px; margin-bottom: 15px; text-align: center;">
      {{ errorMessage }}
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div style="margin-bottom: 15px;">
        <label style="font-weight: bold; color: #555;">Username</label>
        <input type="text" class="form-control" formControlName="username" style="width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px;">
      </div>

      <div style="margin-bottom: 20px;">
        <label style="font-weight: bold; color: #555;">Password</label>
        <input type="password" class="form-control" formControlName="password" style="width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px;">
      </div>

      <button type="submit" [disabled]="loginForm.invalid" style="width: 100%; background-color: #3f51b5; color: white; border: none; padding: 12px; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold;">
        Sign In
      </button>
    </form>
  </div>
</div>
